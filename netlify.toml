# =====================================================
# Netlify Configuration for AR Quest
# =====================================================

[build]
  command = "npm run build"
  publish = ".next"

# Настройки для Next.js static export
[build.environment]
  NODE_VERSION = "20"

# Редиректы для SPA
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Заголовки для камеры и безопасности
[[headers]]
  for = "/*"
  [headers.values]
    # Разрешаем доступ к камере
    Permissions-Policy = "camera=(*), microphone=()"
    # Безопасность
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"

# Кэширование для статических ассетов
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
